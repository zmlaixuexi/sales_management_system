[project]
name = "sales-management-backend"
version = "0.1.0"
description = "销售管理系统后端服务"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.34.0",
    "sqlalchemy[asyncio]>=2.0.0",
    "asyncpg>=0.30.0",
    "psycopg[binary]>=3.2.0",
    "alembic>=1.14.0",
    "pydantic>=2.0.0",
    "pydantic-settings>=2.0.0",
    "python-jose[cryptography]>=3.3.0",
    "bcrypt>=4.0.0",
    "python-multipart>=0.0.18",
    "aiofiles>=24.0.0",
    "prometheus-fastapi-instrumentator>=7.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.25.0",
    "pytest-cov>=6.0.0",
    "httpx>=0.28.0",
    "ruff>=0.9.0",
    "mypy>=1.14.0",
]

[build-system]
requires = ["setuptools>=75.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["app*"]

[tool.ruff]
target-version = "py311"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP", "B", "SIM", "C4", "PERF", "RUF"]
ignore = ["RUF001", "RUF002", "RUF003"]

[tool.ruff.lint.per-file-ignores]
"app/models/*.py" = ["F821"]  # SQLAlchemy forward references in type annotations
"app/api/**/*.py" = ["B008"]  # FastAPI Depends() in function defaults is intentional
"alembic/versions/*.py" = ["I001", "UP"]  # Auto-generated migration files
"tests/*.py" = [
    "ARG001",  # pytest fixtures/setup_module signatures require unused params
    "B007",
    "B008",  # Depends() in test endpoints is intentional
    "B011",
    "C401",
    "E402",
    "E501",
    "E741",
    "F401",
    "F541",
    "F841",
    "I001",
    "N806",
    "PERF102",
    "PERF401",
    "RUF010",
    "RUF012",
    "SIM102",
    "SIM105",
    "SIM108",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["tests"]
addopts = "--import-mode=importlib"
asyncio_mode = "auto"
markers = [
    "crud: CRUD 操作测试",
    "boundary: 边界值和异常路径测试",
    "security: 安全相关测试（认证/权限/速率限制）",
    "export: 导出功能测试",
    "import: 导入功能测试",
    "report: 报表和审计日志测试",
    "integration: 集成测试",
    "infra: 基础设施测试（健康检查/中间件）",
]

[tool.coverage.run]
source = ["app"]
omit = ["app/db/seed.py", "app/main.py"]

[tool.coverage.report]
show_missing = true
skip_covered = false
fail_under = 99

[tool.mypy]
python_version = "3.13"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false
ignore_missing_imports = true
exclude = ["tests/", "alembic/"]
plugins = ["sqlalchemy.ext.mypy.plugin"]

[[tool.mypy.overrides]]
module = "app.main"
disable_error_code = ["no-redef", "assignment", "attr-defined", "arg-type"]

[[tool.mypy.overrides]]
module = "app.api.deps"
disable_error_code = ["attr-defined"]

[[tool.mypy.overrides]]
module = "app.core.ratelimit"
disable_error_code = ["arg-type"]
