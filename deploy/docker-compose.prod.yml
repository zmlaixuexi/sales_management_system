# 生产环境 Docker Compose
# 使用方式：docker compose -f deploy/docker-compose.prod.yml up -d

services:
  postgres:
    image: postgres:17-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?请设置 POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-sales_management}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    # 不对外暴露端口，仅内部网络访问

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: always
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-sales_management}
      DATABASE_ASYNC_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-sales_management}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?请设置 JWT_SECRET_KEY}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      LOG_LEVEL: ${LOG_LEVEL:-WARNING}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      UPLOAD_DIR: /app/uploads
      UPLOAD_PUBLIC_BASE_URL: /uploads
      MAX_IMAGE_SIZE_MB: ${MAX_IMAGE_SIZE_MB:-5}
      MAX_CSV_IMPORT_SIZE_MB: ${MAX_CSV_IMPORT_SIZE_MB:-10}
      MAX_CSV_IMPORT_ROWS: ${MAX_CSV_IMPORT_ROWS:-1000}
      INVENTORY_WARNING_THRESHOLD: ${INVENTORY_WARNING_THRESHOLD:-10}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-100}
      RATE_LIMIT_WINDOW: ${RATE_LIMIT_WINDOW:-60}
      SLOW_REQUEST_THRESHOLD_MS: ${SLOW_REQUEST_THRESHOLD_MS:-1000}
      SLOW_SQL_THRESHOLD_MS: ${SLOW_SQL_THRESHOLD_MS:-200}
      JWT_REFRESH_TOKEN_EXPIRE_DAYS: ${JWT_REFRESH_TOKEN_EXPIRE_DAYS:-7}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-10}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-20}
      DB_POOL_RECYCLE_SECONDS: ${DB_POOL_RECYCLE_SECONDS:-1800}
      MAX_JSON_BODY_MB: ${MAX_JSON_BODY_MB:-1}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import json, urllib.request; r = urllib.request.urlopen('http://localhost:8000/api/v1/health'); d = json.loads(r.read()); assert d.get('data', {}).get('database') == 'ok'"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    # 运行数据库迁移、初始化种子数据后启动服务
    command: >
      sh -c "alembic upgrade head && python -m app.db.seed && uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers ${UVICORN_WORKERS:-2}"

  frontend-build:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api/v1
    volumes:
      - frontend_dist:/dist

  nginx:
    image: nginx:1.27-alpine
    restart: always
    ports:
      - "${HTTP_PORT:-80}:80"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend_dist:/usr/share/nginx/html:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend-build:
        condition: service_started

  prometheus:
    image: prom/prometheus:v3.3.1
    restart: always
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - backend

  grafana:
    image: grafana/grafana:11.6.0
    restart: always
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana:/etc/grafana/provisioning/dashboards:ro
    depends_on:
      - prometheus
    profiles:
      - monitoring

volumes:
  postgres_data:
  uploads_data:
  frontend_dist:
  prometheus_data:
  grafana_data:
