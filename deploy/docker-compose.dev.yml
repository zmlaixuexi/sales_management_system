services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sales_management
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      APP_ENV: ${APP_ENV:-development}
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/sales_management
      DATABASE_ASYNC_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/sales_management
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      UPLOAD_DIR: /app/uploads
      UPLOAD_PUBLIC_BASE_URL: /uploads
      MAX_IMAGE_SIZE_MB: ${MAX_IMAGE_SIZE_MB:-5}
      MAX_CSV_IMPORT_SIZE_MB: ${MAX_CSV_IMPORT_SIZE_MB:-10}
      MAX_CSV_IMPORT_ROWS: ${MAX_CSV_IMPORT_ROWS:-1000}
      INVENTORY_WARNING_THRESHOLD: ${INVENTORY_WARNING_THRESHOLD:-10}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-1000}
      RATE_LIMIT_WINDOW: ${RATE_LIMIT_WINDOW:-60}
      SLOW_REQUEST_THRESHOLD_MS: ${SLOW_REQUEST_THRESHOLD_MS:-1000}
      SLOW_SQL_THRESHOLD_MS: ${SLOW_SQL_THRESHOLD_MS:-200}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      JWT_REFRESH_TOKEN_EXPIRE_DAYS: ${JWT_REFRESH_TOKEN_EXPIRE_DAYS:-7}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-5}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-10}
      DB_POOL_RECYCLE_SECONDS: ${DB_POOL_RECYCLE_SECONDS:-1800}
      MAX_JSON_BODY_MB: ${MAX_JSON_BODY_MB:-1}
      LOG_FORMAT: ${LOG_FORMAT:-text}
    volumes:
      - ../backend/app:/app/app
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile.dev
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ../frontend/src:/app/src
      - ../frontend/public:/app/public
    environment:
      - VITE_API_BASE_URL=http://localhost:${BACKEND_PORT:-8000}/api/v1
      - VITE_PROXY_TARGET=http://backend:8000

volumes:
  postgres_data:
  uploads_data:
