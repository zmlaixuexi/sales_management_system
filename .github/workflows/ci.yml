name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: 安装依赖
        run: pip install ".[dev]"
      - name: Ruff 检查
        run: ruff check .
      - name: 运行测试
        run: python -m pytest tests/ -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: 安装依赖
        run: npm ci
      - name: ESLint 检查
        run: npx eslint src/ --max-warnings=0
      - name: TypeScript 类型检查
        run: npx tsc --noEmit
      - name: 运行测试
        run: npx vitest run
      - name: 构建验证
        run: npm run build
