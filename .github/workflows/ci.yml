name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d test_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: 安装依赖
        run: pip install ".[dev]"
      - name: 运行测试
        env:
          DATABASE_URL: postgresql+psycopg://test:test@localhost:5432/test_ci
          DATABASE_ASYNC_URL: postgresql+asyncpg://test:test@localhost:5432/test_ci
        run: python -m pytest tests/ -q --tb=short -x

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: 安装依赖
        run: npm install
      - name: 构建验证
        run: npm run build
