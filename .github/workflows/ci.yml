name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: 安装依赖
        run: pip install ".[dev]"
      - name: Ruff 检查
        run: ruff check .
      - name: Mypy 类型检查
        run: python -m mypy app/
      - name: 数据库迁移一致性检查
        env:
          DATABASE_URL: postgresql+psycopg://test:test@localhost:5432/test_ci
        run: alembic upgrade head && alembic check
      - name: 运行测试（含覆盖率）
        run: python -m pytest tests/ --cov -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: 安装依赖
        run: npm ci
      - name: ESLint 检查
        run: npx eslint src/ --max-warnings=0
      - name: TypeScript 类型检查
        run: npx tsc --noEmit
      - name: 运行测试（含覆盖率）
        run: npx vitest run --coverage
      - name: 构建验证
        run: npm run build
